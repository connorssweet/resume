<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connor Sweet Resume</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #f5f5f5;
    }
    main {
      height: 100%;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
    .fallback {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      text-align: center;
      margin: 24px;
    }
  </style>
</head>
<body>
  <main>
    <iframe
      title="Connor Sweet Resume"
      src="./connor_sweet_resume.pdf#view=FitH"
    ></iframe>
    <noscript>
      <p class="fallback">
        If the resume does not load inline,
        <a href="./connor_sweet_resume.pdf">open the PDF</a>.
      </p>
    </noscript>
  </main>
  <script>
    (function () {
      var pdfUrl = "./connor_sweet_resume.pdf#view=FitH";
      var isMobile =
        /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
        (window.matchMedia && window.matchMedia("(max-width: 900px)").matches);

      // Many mobile browsers reject PDF objects/iframes. Opening the PDF directly
      // uses the browser's native PDF viewer, which is much more reliable.
      if (isMobile) {
        window.location.replace(pdfUrl);
      }
    })();
  </script>
</body>
</html>
